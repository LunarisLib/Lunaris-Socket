name: CMake CTest pipeline
on:
  workflow_dispatch:


jobs:
  test-project:
    name: Check project
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check version
        run: |
          gcc --version
          g++ --version

      - name: Build Project
        uses: threeal/cmake-action@v2.1.0

      - name: Test Project
        uses: threeal/ctest-action@v1.1.0