name: CMake CTest pipeline
on:
  workflow_dispatch:


jobs:
  test-project:
    name: Check project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: |
          sudo apt install cmake build-essential -y

          cmake -S . -B build
          cmake --build build --parallel 4

      - name: Test Project
        uses: threeal/ctest-action@v1.1.0