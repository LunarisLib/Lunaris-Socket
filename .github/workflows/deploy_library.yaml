name: Deploy library

on:
  push:
    branches:
        - master

jobs:
  make-libs:
    name: Building and deploying on ${{ matrix.os }} - ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            terminal: bash

          - os: windows-latest
            compiler: msvc
            terminal: bash

          - os: windows-latest
            compiler: mingw
            terminal: msys2 {0}

    defaults:
      run:
        shell: ${{ matrix.terminal }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Linux
        if: matrix.compiler == 'gcc'
        run: |
          sudo apt update
          sudo apt install -y gcc-14 g++-14 ninja-build cmake
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Setup MSVC Ninja
        if: matrix.compiler == 'msvc'
        run: |
          choco install ninja --no-progress

      - name: Setup MinGW
        if: matrix.compiler == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - uses: ilammy/msvc-dev-cmd@v1
        if: matrix.compiler == 'msvc'

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 4

      - name: Install
        run: cmake --install build --parallel 4 --prefix install

      - name: Check if it links
        run: |
            cmake -S example -B example-build -G Ninja -DCMAKE_PREFIX_PATH=../install -DCMAKE_BUILD_TYPE=Release
            cmake --build example-build --parallel 4
            
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
            name: lunaris-socket-${{ matrix.os }}-${{ matrix.compiler }}
            files: install/**

